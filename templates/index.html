<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Spam Email Detector</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(120deg,#667eea,#764ba2);
            color: white;
            text-align: center;
            padding: 40px;
        }
        .container {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1 class="mb-4">AI Spam Email Detector</h1>
    <div class="container">
        <form method="POST">
            <div class="mb-3">
                <label for="subject" class="form-label">Email Subject</label>
                <input type="text" class="form-control" id="subject" name="subject" placeholder="Enter email subject" required>
            </div>
            <div class="mb-3">
                <label for="message" class="form-label">Email Message</label>
                <textarea class="form-control" id="message" name="message" rows="4" placeholder="Enter email message" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-100">Check Email</button>
        </form>

        {% if prediction %}
        <div class="result alert alert-info mt-4">
            Result: {{prediction}} <br>
            Confidence: {{confidence}} %
        </div>
        {% endif %}

        <!-- Buttons Section -->
        <a href="/history" class="btn btn-secondary mt-3 w-100">View Spam History</a>
        <a href="/login" class="btn btn-warning mt-3 w-100">🔑 Login</a>
    </div>
</body>
</html>
